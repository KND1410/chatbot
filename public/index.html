<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Mini Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-box { background: white; width: 420px; height: 600px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
    .header { background: #4f46e5; color: white; padding: 16px 20px; font-weight: bold; font-size: 1.1rem; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; line-height: 1.5; font-size: 0.95rem; }
    .msg.user { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.bot  { background: #f1f1f1; color: #222; align-self: flex-start; border-bottom-left-radius: 4px; }
    .input-row { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #eee; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 0.95rem; }
    button { background: #4f46e5; color: white; border: none; padding: 10px 18px; border-radius: 24px; cursor: pointer; font-size: 0.95rem; }
    button:disabled { opacity: 0.5; }
  </style>
</head>
<body>
<div class="chat-box">
  <div class="header">🤖 Mia — Mini Chatbot</div>
  <div class="messages" id="messages">
    <div class="msg bot">Hello! I am Mia. What can I help you today?</div>
  </div>
  <div class="input-row">
    <input id="input" placeholder="Enter message..." />
    <button id="btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  //Memory
  const history = [];

  async function sendMessage() {
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, 'user');
    input.value = '';
    btn.disabled = true;

    // Send message + history to server
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history })
    });
    const data = await res.json();

    // Update history (short-term memory)
    history.push({ role: 'user',      content: msg });
    history.push({ role: 'assistant', content: data.reply });

    addMessage(data.reply, 'bot');
    btn.disabled = false;
    document.getElementById('input').focus();
  }

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    const msgs = document.getElementById('messages');
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
</body>
</html>
